chugalkhor:
  session:
    default-passkey: jungle
    inactivity-minutes: 30
  conversation-director:
    dev-delay-multiplier: 0.25

spring:
  datasource:
    url: jdbc:h2:mem:chugalkhorbandar;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    jpa:
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
