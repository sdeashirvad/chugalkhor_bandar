<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f1ea;font-family:Georgia,'Times New Roman',serif;color:#2c2416;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f1ea;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#fffdf8;border:1px solid #d8cdb8;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#3d5a3e,#6b8f71);padding:28px 32px;color:#fff;">
              <p style="margin:0;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.9;">Jungle Daily Report</p>
              <h1 style="margin:8px 0 0;font-size:28px;font-weight:normal;">{{greeting}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {{reflectionSection}}
              <h2 style="margin:0 0 16px;font-size:18px;color:#3d5a3e;">Statistics</h2>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  {{statCards}}
                </tr>
              </table>
              <h2 style="margin:28px 0 12px;font-size:18px;color:#3d5a3e;">Attachments</h2>
              <ul style="margin:0;padding-left:20px;color:#5a4f42;line-height:1.8;">
                {{attachmentsList}}
              </ul>
              <p style="margin:32px 0 0;font-size:16px;font-style:italic;color:#5a4f42;border-top:1px solid #e8dfd0;padding-top:24px;">{{closing}}</p>
              <p style="margin:16px 0 0;font-size:13px;color:#8a7f72;">— Bandar 🐒</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
